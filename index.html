<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architectural Node Canvas</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- App Container -->
    <div id="app">
        <!-- Floating Header/Toolbar -->
        <header class="toolbar-panel">
            <div class="logo">
                <span class="logo-icon">📐</span>
                <span class="logo-text">ArchiCanvas <span class="badge">v1.0</span></span>
            </div>
            
            <div class="divider"></div>
            
            <div class="actions" style="display: flex; flex-direction: column; gap: 15px; width: 100%; flex: 1; min-height: 0;">
                <button id="btn-new-project" class="btn btn-secondary" title="New Project">
                    <span class="btn-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: block;">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </span>
                    <span class="btn-text">New Project</span>
                </button>
                
                <div class="recent-projects-container" style="width: 100%;">
                    <span class="section-title">Saved Projects</span>
                    <div id="recent-projects-list" style="margin-top: 5px;"></div>
                </div>
            </div>
        </header>

        <!-- Main Node Canvas Container -->
        <div id="canvas-container">
            <div id="canvas-board">
                <!-- SVG layer for wires -->
                <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Grid pattern for background -->
                        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                            <circle cx="20" cy="20" r="1.5" fill="#a3a3a3" shape-rendering="crispEdges" />
                        </pattern>
                        <!-- Glow filters for cables -->
                        <filter id="wire-glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>
                    <!-- Background Grid Rect -->
                    <rect width="100%" height="100%" fill="url(#grid)" />
                    <!-- Rendered connections will go here -->
                    <g id="connections-group"></g>
                    <!-- Temporary wire during drag -->
                    <path id="temp-wire" class="wire temp-wire" d="" fill="none" style="display: none;" />
                </svg>

                <!-- HTML Nodes Container -->
                <div id="nodes-layer"></div>
            </div>
        </div>
        
        <!-- Sidebar Properties Panel (Right side) -->
        <aside id="properties-panel" class="properties-panel collapsed">
            <div class="collapsed-icon">⚙️</div>
            <div class="properties-header">
                <h2>Properties</h2>
            </div>
            <div id="properties-content" class="properties-content">
                <div class="no-selection-msg">Select a node to edit properties</div>
            </div>
        </aside>

        <!-- Floating Footer / Status Bar -->
        <footer class="status-panel">
            <div class="status-item">
                <span class="status-dot green"></span> Ready
            </div>
            <div class="status-item font-mono" id="zoom-indicator">Zoom: 100%</div>
            <div class="status-item hint">Drag canvas to Pan • Scroll to Zoom • Drag sockets to Connect</div>
        </footer>
    </div>

    <!-- JS Scripts (Modular imports) -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
